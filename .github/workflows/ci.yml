name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10.33.0

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: echo "$GITHUB_WORKSPACE/node_modules/.bin" >> "$GITHUB_PATH"

      - run: nx run check

      - run: nx run build

      - run: nx run test:unit

      - run: xvfb-run -a nx run test:integration
        env:
          DISPLAY: ":99"

      - run: nx run package:bin

      - uses: actions/upload-artifact@v7
        with:
          name: vsix
          path: pkg/*.vsix
