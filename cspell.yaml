---
dictionaries:
  - project-dictionary
dictionaryDefinitions:
  - addWords: true
    name: project-dictionary
    path: "./cspell.dict"
ignorePaths:
  - "*.vsix"
  - ".claude"
  - ".git"
  - ".nx"
  - ".playwright-mcp"
  - ".pnpm-store"
  - ".serena"
  - ".tmp"
  - ".vscode-test"
  - dist
  - node_modules
  - pkg
  - pnpm-lock.yaml
  - tmp
ignoreRandomStrings: true
ignoreRegExpList:
  - "/\\\\[a-zA-Z]/g"
  - "/op:\\/\\/\\S+/g"
language: en,en-US
minRandomLength: 24
version: "0.2"
